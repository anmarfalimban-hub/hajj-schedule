<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جدول مناوبة أعضاء مركز الخدمة ١٤١ باكستان</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; direction: rtl; background: #f5f5f5; min-height: 100vh; padding: 1rem; }
  .container { max-width: 580px; margin: 0 auto; padding: 1.5rem 1rem; }
  .header { text-align: center; margin-bottom: 1.5rem; }
  .logo-wrap { display: flex; justify-content: center; margin-bottom: 10px; }
  .logo-wrap img { height: 64px; width: auto; object-fit: contain; }
  .header h1 { font-size: 19px; font-weight: 500; color: #1a1a1a; margin-bottom: 4px; line-height: 1.4; }
  .header p { font-size: 13px; color: #666; }
  .card { background: #fff; border: 0.5px solid #ddd; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .field-label { font-size: 13px; color: #666; margin-bottom: 6px; display: block; }
  .field-label span { color: #e24b4a; }
  input[type="text"] { width: 100%; padding: 8px 12px; border: 0.5px solid #ccc; border-radius: 8px; font-size: 14px; font-family: Arial, sans-serif; direction: rtl; outline: none; transition: border-color 0.15s; }
  input[type="text"]:focus { border-color: #1D9E75; }
  .shift-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 6px; }
  .shift-card { border: 0.5px solid #ccc; border-radius: 8px; padding: 12px 8px; text-align: center; cursor: pointer; transition: all 0.15s; background: #fff; user-select: none; }
  .shift-card:hover { background: #f0f0f0; }
  .shift-card.selected { background: #E6F1FB; border-color: #378ADD; }
  .shift-num { font-size: 11px; color: #888; margin-bottom: 4px; }
  .shift-time { font-size: 14px; font-weight: 500; color: #333; margin-bottom: 2px; }
  .shift-card.selected .shift-time { color: #185FA5; }
  .shift-desc { font-size: 11px; color: #888; }
  .shift-icon { font-size: 18px; margin-bottom: 4px; }
  .week-note { font-size: 12px; color: #1D9E75; background: #E1F5EE; border-radius: 8px; padding: 8px 12px; margin-top: 10px; text-align: center; display: none; }
  .submit-btn { width: 100%; padding: 12px; background: #1D9E75; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.15s; margin-top: 0.5rem; font-family: Arial; }
  .submit-btn:hover { background: #0F6E56; }
  .submit-btn:disabled { background: #ddd; color: #999; cursor: not-allowed; }
  .records-section { margin-top: 1.5rem; }
  .records-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .records-title-text { font-size: 14px; font-weight: 500; color: #666; }
  .badge { background: #E1F5EE; color: #0F6E56; font-size: 11px; padding: 2px 8px; border-radius: 20px; }
  .actions-row { display: flex; gap: 8px; align-items: center; }
  .record-item { background: #fff; border: 0.5px solid #ddd; border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
  .record-name { font-size: 14px; font-weight: 500; color: #1a1a1a; }
  .record-meta { font-size: 12px; color: #888; margin-top: 2px; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
  .tag-1 { background: #E1F5EE; color: #0F6E56; }
  .tag-2 { background: #E6F1FB; color: #185FA5; }
  .tag-3 { background: #FAEEDA; color: #633806; }
  .empty-state { text-align: center; padding: 1.5rem; color: #888; font-size: 13px; }
  .del-btn { background: none; border: none; cursor: pointer; color: #aaa; font-size: 14px; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
  .del-btn:hover { color: #e24b4a; }
  .success-msg { background: #E1F5EE; border: 0.5px solid #5DCAA5; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #0F6E56; display: none; margin-bottom: 1rem; text-align: center; }
  .section-divider { height: 0.5px; background: #eee; margin: 1.5rem 0; }
  .export-btn { background: #185FA5; color: white; border: none; border-radius: 8px; padding: 7px 16px; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s; font-family: Arial; }
  .export-btn:hover { background: #0C447C; }
  .export-btn:disabled { background: #ddd; color: #999; cursor: not-allowed; }
  .print-btn { background: none; border: 0.5px solid #ccc; border-radius: 8px; padding: 6px 12px; font-size: 13px; color: #666; cursor: pointer; font-family: Arial; }
  .print-btn:hover { background: #f0f0f0; }

  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 1rem; }
  .stat-card { border-radius: 10px; padding: 14px 10px; text-align: center; border: 0.5px solid; }
  .stat-card .stat-label { font-size: 11px; font-weight: 500; margin-bottom: 6px; }
  .stat-card .stat-num { font-size: 26px; font-weight: 500; }
  .stat-card.s1 { background: #E1F5EE; border-color: #5DCAA5; }
  .stat-card.s1 .stat-label { color: #0F6E56; }
  .stat-card.s1 .stat-num { color: #0F6E56; }
  .stat-card.s2 { background: #E6F1FB; border-color: #85B7EB; }
  .stat-card.s2 .stat-label { color: #185FA5; }
  .stat-card.s2 .stat-num { color: #185FA5; }
  .stat-card.s3 { background: #FAEEDA; border-color: #FAC775; }
  .stat-card.s3 .stat-label { color: #633806; }
  .stat-card.s3 .stat-num { color: #633806; }
  .export-status { font-size: 12px; color: #185FA5; margin-top: 6px; display: none; text-align: center; }
</style>
</head>

    <h1>جدول مناوبة أعضاء مركز الخدمة ١٤١ باكستان</h1>
  </div>

  <div id="successMsg" class="success-msg"></div>

  <div class="card">
    <div style="margin-bottom:1rem;">
      <label class="field-label">اسم العضو <span>*</span></label>
      <input type="text" id="empName" placeholder="أدخل الاسم كاملاً" />
    </div>
    <div>
      <label class="field-label">فترة المناوبة (تطبق على كامل أيام الأسبوع) <span>*</span></label>
      <div class="shift-grid">
        <div class="shift-card" data-shift="1">
          <div class="shift-icon">🌅</div>
          <div class="shift-num">الفترة الأولى</div>
          <div class="shift-time">08:00 – 16:00</div>
          <div class="shift-desc">صباحي</div>
        </div>
        <div class="shift-card" data-shift="2">
          <div class="shift-icon">🌆</div>
          <div class="shift-num">الفترة الثانية</div>
          <div class="shift-time">16:00 – 00:00</div>
          <div class="shift-desc">مسائي</div>
        </div>
        <div class="shift-card" data-shift="3">
          <div class="shift-icon">🌙</div>
          <div class="shift-num">الفترة الثالثة</div>
          <div class="shift-time">00:00 – 08:00</div>
          <div class="shift-desc">ليلي</div>
        </div>
      </div>
      <div id="weekNote" class="week-note"></div>
    </div>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="submitForm()" disabled>تسجيل المناوبة</button>


  <div class="stats-grid">
    <div class="stat-card s1">
      <div class="stat-label">🌅 الفترة الأولى<br>08:00 – 16:00</div>
      <div class="stat-num" id="cnt1">0</div>
    </div>
    <div class="stat-card s2">
      <div class="stat-label">🌆 الفترة الثانية<br>16:00 – 00:00</div>
      <div class="stat-num" id="cnt2">0</div>
    </div>
    <div class="stat-card s3">
      <div class="stat-label">🌙 الفترة الثالثة<br>00:00 – 08:00</div>
      <div class="stat-num" id="cnt3">0</div>
    </div>
  </div>

  <div class="section-divider"></div>

  <div class="records-section">
    <div class="records-header">
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="records-title-text">السجلات</span>
        <span class="badge" id="recordCount">0</span>
      </div>
      <div class="actions-row">
        <button class="print-btn" onclick="printRecords()">طباعة ⎙</button>
        <button class="export-btn" id="exportBtn" onclick="exportToExcel()" disabled>↓ تصدير إكسل</button>
      </div>
    </div>
    <div id="exportStatus" class="export-status">⏳ جاري إنشاء ملف الإكسل...</div>
    <div id="recordsList" style="display:none;"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
let selectedShift = '', records = [];
const shiftLabels = {'1':'08:00 – 16:00','2':'16:00 – 00:00','3':'00:00 – 08:00'};
const shiftNames  = {'1':'الفترة الأولى','2':'الفترة الثانية','3':'الفترة الثالثة'};
const shiftColors = {'1':'#0F6E56','2':'#185FA5','3':'#633806'};
const arabicDays  = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];

document.getElementById('empName').addEventListener('input', checkForm);

document.querySelectorAll('.shift-card').forEach(card => card.addEventListener('click', function() {
  document.querySelectorAll('.shift-card').forEach(c => c.classList.remove('selected'));
  this.classList.add('selected');
  selectedShift = this.dataset.shift;
  const note = document.getElementById('weekNote');
  note.textContent = '✓ سيتم تسجيل ' + shiftNames[selectedShift] + ' (' + shiftLabels[selectedShift] + ') لجميع أيام الأسبوع السبعة';
  note.style.display = 'block';
  checkForm();
}));

function checkForm() {
  document.getElementById('submitBtn').disabled = !(document.getElementById('empName').value.trim() && selectedShift);
}

function submitForm() {
  const name = document.getElementById('empName').value.trim();
  records.unshift({ name, shiftName: shiftNames[selectedShift], shiftTime: shiftLabels[selectedShift], shift: selectedShift });
  document.getElementById('empName').value = '';
  document.getElementById('weekNote').style.display = 'none';
  selectedShift = '';
  document.querySelectorAll('.shift-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('submitBtn').disabled = true;
  const msg = document.getElementById('successMsg');
  msg.textContent = '✓ تم تسجيل مناوبة ' + name + ' بنجاح';
  msg.style.display = 'block';
  setTimeout(() => msg.style.display = 'none', 3000);
  renderRecords();
}

function deleteRecord(i) { records.splice(i,1); renderRecords(); }

function renderRecords() {
  const list = document.getElementById('recordsList');
  document.getElementById('recordCount').textContent = records.length;
  document.getElementById('cnt1').textContent = records.filter(r=>r.shift==='1').length;
  document.getElementById('cnt2').textContent = records.filter(r=>r.shift==='2').length;
  document.getElementById('cnt3').textContent = records.filter(r=>r.shift==='3').length;
  document.getElementById('exportBtn').disabled = records.length === 0;
  if (!records.length) { list.innerHTML = '<div class="empty-state">لا توجد سجلات بعد</div>'; return; }
  list.innerHTML = records.map((r,i) => `
    <div class="record-item">
      <div style="flex:1;min-width:0;">
        <div class="record-name">${r.name}</div>
        <div class="record-meta">جميع أيام الأسبوع · 7 أيام</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;margin-right:8px;">
        <span class="tag tag-${r.shift}">${r.shiftName} · ${r.shiftTime}</span>
        <button class="del-btn" onclick="deleteRecord(${i})">✕</button>
      </div>
    </div>`).join('');
}

function exportToExcel() {
  if (!records.length) return;
  document.getElementById('exportStatus').style.display = 'block';
  setTimeout(() => {
    const wb = XLSX.utils.book_new();
    const headers = ['م','اسم العضو','اليوم','الفترة','وقت المناوبة'];
    let allRows = [], n = 1;
    [...records].reverse().forEach(r => {
      arabicDays.forEach(day => {
        allRows.push([n++, r.name, day, r.shiftName, r.shiftTime]);
      });
    });

    const ws = XLSX.utils.aoa_to_sheet([headers, ...allRows]);
    ws['!cols'] = [{wch:5},{wch:28},{wch:12},{wch:16},{wch:18}];
    const border = {top:{style:'thin',color:{rgb:'C8E6D9'}},bottom:{style:'thin',color:{rgb:'C8E6D9'}},left:{style:'thin',color:{rgb:'C8E6D9'}},right:{style:'thin',color:{rgb:'C8E6D9'}}};
    const hStyle = {font:{name:'Arial',bold:true,color:{rgb:'FFFFFF'},sz:12},fill:{patternType:'solid',fgColor:{rgb:'1D9E75'}},alignment:{horizontal:'center',vertical:'center'},border:{top:{style:'medium',color:{rgb:'0F6E56'}},bottom:{style:'medium',color:{rgb:'0F6E56'}},left:{style:'medium',color:{rgb:'0F6E56'}},right:{style:'medium',color:{rgb:'0F6E56'}}}};
    headers.forEach((_,ci)=>{ const a=XLSX.utils.encode_cell({r:0,c:ci}); if(!ws[a])ws[a]={}; ws[a].s=hStyle; });
    const sc={'الفترة الأولى':{bg:'E1F5EE',fg:'0F6E56'},'الفترة الثانية':{bg:'E6F1FB',fg:'185FA5'},'الفترة الثالثة':{bg:'FAEEDA',fg:'633806'}};
    allRows.forEach((row,ri)=>{
      const alt=ri%2===1, c=sc[row[3]];
      row.forEach((_,ci)=>{
        const a=XLSX.utils.encode_cell({r:ri+1,c:ci}); if(!ws[a])ws[a]={};
        let bg=alt?'F5FAF8':'FFFFFF', fg='000000';
        if((ci===3||ci===4)&&c){bg=c.bg;fg=c.fg;}
        ws[a].s={font:{name:'Arial',sz:11,color:{rgb:fg},bold:(ci===3||ci===4)},fill:{patternType:'solid',fgColor:{rgb:bg}},alignment:{horizontal:ci===1?'right':'center',vertical:'center'},border};
      });
    });
    XLSX.utils.book_append_sheet(wb, ws, 'جدول المناوبة');

    // Summary sheet
    const c1=records.filter(r=>r.shift==='1').length, c2=records.filter(r=>r.shift==='2').length, c3=records.filter(r=>r.shift==='3').length;
    const ws2=XLSX.utils.aoa_to_sheet([
      ['ملخص جدول المناوبة','','','',''],
      ['إجمالي الأعضاء','الفترة الأولى','الفترة الثانية','الفترة الثالثة',''],
      [records.length, c1, c2, c3, '']
    ]);
    ws2['!cols']=[{wch:18},{wch:18},{wch:18},{wch:18},{wch:10}];
    ws2['!merges']=[{s:{r:0,c:0},e:{r:0,c:4}}];
    ws2['A1'].s={font:{name:'Arial',bold:true,sz:15,color:{rgb:'FFFFFF'}},fill:{patternType:'solid',fgColor:{rgb:'1D9E75'}},alignment:{horizontal:'center',vertical:'center'}};
    const kH=['0F6E56','1D9E75','185FA5','633806'], kV=['E1F5EE','D1FAE5','E6F1FB','FAEEDA'], kF=['0F6E56','0F6E56','185FA5','633806'];
    ['A','B','C','D'].forEach((col,i)=>{
      const h=col+'2',v=col+'3'; if(!ws2[h])ws2[h]={}; if(!ws2[v])ws2[v]={};
      ws2[h].s={font:{name:'Arial',bold:true,sz:11,color:{rgb:'FFFFFF'}},fill:{patternType:'solid',fgColor:{rgb:kH[i]}},alignment:{horizontal:'center',vertical:'center'},border};
      ws2[v].s={font:{name:'Arial',bold:true,sz:18,color:{rgb:kF[i]}},fill:{patternType:'solid',fgColor:{rgb:kV[i]}},alignment:{horizontal:'center',vertical:'center'},border};
    });
    XLSX.utils.book_append_sheet(wb, ws2, 'ملخص المناوبة');

    XLSX.writeFile(wb, 'جدول_مناوبة_مركز_الخدمة_141.xlsx');
    document.getElementById('exportStatus').style.display='none';
  }, 100);
}

function printRecords() {
  if (!records.length) return;
  let allRows = [], n = 1;
  [...records].reverse().forEach(r => {
    arabicDays.forEach(day => {
      allRows.push(`<tr><td>${n++}</td><td>${r.name}</td><td>${day}</td><td style="color:${shiftColors[r.shift]};font-weight:bold">${r.shiftName}</td><td>${r.shiftTime}</td></tr>`);
    });
  });
  const w = window.open('','_blank');
  w.document.write(`<html dir="rtl"><head><meta charset="utf-8"><title>جدول المناوبة</title><style>body{font-family:Arial;padding:24px;direction:rtl}h2{color:#0F6E56;margin-bottom:16px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border:1px solid #C8E6D9;padding:7px 10px;text-align:right}th{background:#1D9E75;color:white}</style></head><body><h2>جدول مناوبة أعضاء مركز الخدمة ١٤١ باكستان</h2><table><tr><th>م</th><th>اسم العضو</th><th>اليوم</th><th>الفترة</th><th>التوقيت</th></tr>${allRows.join('')}</table></body></html>`);
  w.document.close(); w.print();
}

renderRecords();
</script>
